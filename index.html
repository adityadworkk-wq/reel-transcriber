<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reel Transcriber</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0e0e0e;
      color: #f0f0f0;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #e1306c; }

    button {
      margin-top: 1rem;
      width: 100%;
      background: #e1306c;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:hover { background: #c9275f; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: #888;
      min-height: 1.2em;
    }

    .result-box {
      margin-top: 1.5rem;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
      display: none;
    }

    .result-box.visible { display: block; }

    .copy-btn {
      margin-top: 0.75rem;
      background: #222;
      color: #aaa;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      width: auto;
    }

    .copy-btn:hover { background: #2a2a2a; color: #f0f0f0; }

    .error { color: #ff6b6b; margin-top: 1rem; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reel Transcriber</h1>
    <p class="subtitle">Paste an Instagram Reel URL — get English text back.</p>

    <label for="url">Reel URL</label>
    <input id="url" type="url" placeholder="https://www.instagram.com/reel/..." />

    <button id="btn" onclick="transcribe()">Transcribe</button>

    <p class="status" id="status"></p>
    <p class="error" id="error"></p>

    <div class="result-box" id="result"></div>
    <button class="copy-btn" id="copy-btn" onclick="copyText()" style="display:none">Copy transcript</button>
  </div>

  <script>
    async function transcribe() {
      const url = document.getElementById('url').value.trim();
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      const error = document.getElementById('error');
      const result = document.getElementById('result');
      const copyBtn = document.getElementById('copy-btn');

      error.textContent = '';
      result.textContent = '';
      result.classList.remove('visible');
      copyBtn.style.display = 'none';

      if (!url) { error.textContent = 'Please enter a URL.'; return; }

      btn.disabled = true;
      status.textContent = 'Downloading audio…';

      try {
        const res = await fetch('/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await res.json();

        if (!res.ok) {
          error.textContent = data.detail || 'Something went wrong.';
          return;
        }

        status.textContent = 'Done.';
        result.textContent = data.transcript;
        result.classList.add('visible');
        copyBtn.style.display = 'block';
      } catch (e) {
        error.textContent = 'Request failed. Is the server running?';
      } finally {
        btn.disabled = false;
      }
    }

    function copyText() {
      const text = document.getElementById('result').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy transcript', 2000);
      });
    }

    document.getElementById('url').addEventListener('keydown', e => {
      if (e.key === 'Enter') transcribe();
    });
  </script>
</body>
</html>
